<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="Tradisional Jawa top ornament">
  <defs>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c66a"/>
      <stop offset="0.5" stop-color="#c8a24a"/>
      <stop offset="1" stop-color="#a8842f"/>
    </linearGradient>
    <pattern id="tumpal" width="48" height="22" patternUnits="userSpaceOnUse">
      <path d="M0 0 L24 22 L48 0 Z" fill="url(#gv)" fill-opacity="0.55" stroke="#22315c" stroke-width="0.6"/>
    </pattern>
    <g id="kawung" fill="none" stroke="url(#gv)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="10" r="10"/>
      <circle cx="30" cy="20" r="10"/>
      <circle cx="20" cy="30" r="10"/>
      <circle cx="10" cy="20" r="10"/>
      <circle cx="20" cy="20" r="4" fill="url(#gv)" fill-opacity="0.6" stroke="none"/>
    </g>
    <g id="gunungan" fill="none" stroke="url(#gv)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 56 C-14 52 -16 30 0 6 C16 30 14 52 0 56 Z"/>
      <path d="M0 46 C-9 43 -10 28 0 16 C10 28 9 43 0 46 Z" fill="#c8a24a" fill-opacity="0.3" stroke-width="1"/>
      <path d="M0 36 C-5 34 -5 26 0 20 C5 26 5 34 0 36 Z" fill="#c8a24a" fill-opacity="0.55" stroke-width="0.8"/>
      <circle cx="0" cy="26" r="2.2" fill="#c8a24a" stroke="none"/>
    </g>
  </defs>

  <rect x="0" y="2" width="1200" height="22" fill="url(#tumpal)"/>
  <line x1="0" y1="26" x2="1200" y2="26" stroke="url(#gv)" stroke-width="1.5" opacity="0.6"/>
  <line x1="6" y1="2" x2="1194" y2="2" stroke="url(#gv)" stroke-width="1" opacity="0.4"/>

  <use href="#kawung" transform="translate(30,40)"/>
  <use href="#kawung" transform="translate(1170,40) scale(-1,1)"/>
  <use href="#gunungan" transform="translate(600,18)"/>
</svg>
